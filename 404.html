    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>

    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;600&display=swap" onload="this.onload=null;this.rel='stylesheet'">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="style.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            background: linear-gradient(135deg, var(--background-color) 0%, #0f0f0f 50%, var(--background-color) 100%);
        }
        .error-content {
            max-width: 550px;
        }
        .error-code {
            font-size: clamp(5rem, 15vw, 10rem);
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 1rem;
        }
        .error-title {
            font-size: clamp(1.3rem, 3vw, 1.8rem);
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }
        .error-desc {
            color: var(--text-secondary);
            font-size: 1.05rem;
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }
        .error-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
        }
        .error-illustration {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-content">
            <div class="error-illustration">🔍</div>
            <div class="error-code">404</div>
            <h1 class="error-title">Page introuvable</h1>
            <p class="error-desc">
                Oups ! La page que vous cherchez n'existe pas ou a été déplacée.
                Pas de panique, voici quelques liens utiles.
            </p>
            <div class="error-actions">
                <a href="/" class="btn btn-primary">
                    <i class="fas fa-house"></i> Accueil
                </a>
                <a href="/#projects" class="btn btn-secondary">
                    <i class="fas fa-folder-open"></i> Projets
                </a>
                <a href="/#contact" class="btn btn-ghost">
                    <i class="fas fa-envelope"></i> Contact
                </a>
            </div>
        </div>
    </div>
